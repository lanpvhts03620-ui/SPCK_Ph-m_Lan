<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register</title>


    <!-- font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- main css  -->
    <link rel="stylesheet" href="./CSS/login.css">

</head>

<body>
     <a href="./index.html"><img src="./img/logo_edited.png" alt="Logo" class="logo"></a>
    <div class="container" id="container">
<!-- Đăng kí  -->
        <div class="form-container register-container">
            <form action="#">
                <h1>Đăng kí</h1>
                <input type="text" placeholder="Tên người dùng">
                <input type="email" placeholder="Nhập email">
                <input type="password" placeholder="Nhập mật khẩu">
                <button>Đăng kí</button>
                <span>Bạn đã có tài khoản?</span>
                <div class="social-container">
                    <a href="#" class="social"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" class="social"><i class="fa-brands fa-google"></i></a>
                    <a href="#" class="social"><i class="fa-brands fa-instagram"></i></a>
                </div>
            </form>
        </div>
<!-- Đăng nhập  -->
        <div class="form-container login-container">
            <form action="#">
                <h1>Đăng nhập</h1>
                <input type="email" placeholder="Nhập email">
                <input type="password" placeholder="Nhập mật khẩu">
                <div class="content">
                    <div class="check-box">
                        <input type="checkbox" name="check-box" id="checkbox">
                        <label>Lưu mật khẩu</label>
                    </div>
                    <div class="pass-link">
                        <a href="#">Quên mật khẩu?</a>
                    </div>
                </div>
                <button>Đăng nhập</button>
                <span>Bạn chưa có tài khoản?</span>
                <div class="social-container">
                    <a href="#" class="social"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" class="social"><i class="fa-brands fa-google"></i></a>
                    <a href="#" class="social"><i class="fa-brands fa-instagram"></i></a>
                </div>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1 class="title">Xin chào <br>bạn</h1>
                    <p>Nếu bạn đã có tài khoản, hãy đăng nhập vào.</p>
                    <button class="ghost" id="login">Đăng nhập
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1 class="title">Bắt đầu <br> trải nghiệm ngay!</h1>
                    <p>Nếu bạn chưa có tài khoản, hãy tham gia và trải nghiệm nhé.</p>
                    <button class="ghost" id="register">Đăng kí
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- js  -->
    <script src="./JS/login.js"></script>

</body>

</html>
